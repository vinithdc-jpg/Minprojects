<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="calculator">

        <div class="display">

            <input type="text" id="screen" readonly>

        </div>

        <div class="buttons">

            <button onclick="clearScreen()">AC</button>
            <button onclick="backspace()">⌫</button>
            <button onclick="insert('(')">(</button>
            <button onclick="insert(')')">)</button>

            <button onclick="insert('Math.sin(')">sin</button>
            <button onclick="insert('Math.cos(')">cos</button>
            <button onclick="insert('Math.tan(')">tan</button>
            <button onclick="insert('/')">÷</button>

            <button onclick="insert('Math.asin(')">asin</button>
            <button onclick="insert('Math.acos(')">acos</button>
            <button onclick="insert('Math.atan(')">atan</button>
            <button onclick="insert('*')">×</button>

            <button onclick="insert('Math.log10(')">log</button>
            <button onclick="insert('Math.log(')">ln</button>
            <button onclick="insert('Math.sqrt(')">√</button>
            <button onclick="insert('-')">−</button>

            <button onclick="insert('Math.PI')">π</button>
            <button onclick="insert('Math.E')">e</button>
            <button onclick="square()">x²</button>
            <button onclick="insert('+')">+</button>

            <button onclick="factorial()">x!</button>
            <button onclick="insert('%')">%</button>
            <button onclick="randomNumber()">Rand</button>
            <button onclick="calculate()">=</button>

            <button onclick="insert('7')">7</button>
            <button onclick="insert('8')">8</button>
            <button onclick="insert('9')">9</button>

            <button onclick="insert('4')">4</button>
            <button onclick="insert('5')">5</button>
            <button onclick="insert('6')">6</button>

            <button onclick="insert('1')">1</button>
            <button onclick="insert('2')">2</button>
            <button onclick="insert('3')">3</button>

            <button class="zero" onclick="insert('0')">0</button>
            <button onclick="insert('.')">.</button>

        </div>

    </div>

    <div class="history">

        <h2>History</h2>

        <ul id="history"></ul>

        <button onclick="clearHistory()">Clear History</button>

    </div>

    <script src="script.js"></script>

</body>

</html>
