<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brew Timer & Recipes</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>☕ Brew Timer & Recipes</h1>

        <div class="timer-section">

            <h2>Brew Timer</h2>

            <select id="brewSelect">
                <option value="180">Pour Over (3 min)</option>
                <option value="30">Espresso (30 sec)</option>
                <option value="240">French Press (4 min)</option>
                <option value="120">Aeropress (2 min)</option>
            </select>

            <div id="timer">03:00</div>

            <div class="buttons">
                <button onclick="startTimer()">▶ Start</button>
                <button onclick="pauseTimer()">⏸ Pause</button>
                <button onclick="resetTimer()">🔄 Reset</button>
            </div>

        </div>

        <hr>

        <div class="recipe-section">

            <h2>Save Coffee Recipe</h2>

            <input id="name" placeholder="Recipe Name">

            <input id="coffee" placeholder="Coffee (g)">

            <input id="water" placeholder="Water (ml)">

            <textarea id="steps" placeholder="Brewing Steps"></textarea>

            <button onclick="saveRecipe()">Save Recipe</button>

        </div>

        <hr>

        <h2>Your Recipes</h2>

        <div id="recipes"></div>

    </div>

    <script src="script.js"></script>

</body>

</html>
