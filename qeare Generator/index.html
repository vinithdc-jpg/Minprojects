<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <p>Enter your text or URL</p>
        <input type="text" placeholder="Enter url" id="inputqr">

        <div id="imgbox">
            <img src="" id="qrl">
        </div>
        <button onclick="genarateqr()">Genarate quar</button>
    </div>

    <script>
        let qrimage = document.getElementById('qrl')
        let imgbox = document.getElementById('imgbox')
        let input = document.getElementById('inputqr')

        function genarateqr(){
            if(input.value.lenght >0){

                qrimage.src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + input.value;
                imgbox.classList.add('show-img')
            }
            else{
                
            }
        }
    </script>
</body>
</html>
