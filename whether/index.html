<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card">
        <div class="search">
            <input class="name" type="text" placeholder="Enter name of city" spellcheck="false">
            <button class="button"><img src="search-svgrepo-com.svg"></button>
        </div>
        <div class="wether">
            <img src="sun-2-svgrepo-com.svg" alt="">
            <h1 class="temp">25°C</h1>
            <h2 class="city">New york</h2>
        </div>
        <div class="detail">
            <div class="temparary">
                <img src="humidity-svgrepo-com.svg" alt="">
                <h2 class="cel">23%</h2>
            </div>
            <div class="wind">
                <img src="wind-svgrepo-com.svg" alt="">
                <h2 class="km">34</h2>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
